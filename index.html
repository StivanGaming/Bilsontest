<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #start-btn {
      color: #222;
      background: none;
      border: 1px solid #222;
      padding: 10px 20px;
      font-family: monospace;
      cursor: pointer;
      font-size: 13px;
    }

    #backdrop {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      display: none;
      opacity: 1;
      z-index: 9998;
    }

    #bilson {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      opacity: 1;
      z-index: 9999;
    }

    #bilson img {
      width: 498px;
      max-width: 100vw;
      height: auto;
    }
  </style>
</head>
<body>

<button id="start-btn" onclick="activate()">click</button>
<div id="backdrop"></div>
<div id="bilson"><img src="bilson.png"></div>
<audio id="radar" src="Radar.mp3"></audio>

<script>
  const btn      = document.getElementById('start-btn');
  const bilson   = document.getElementById('bilson');
  const backdrop = document.getElementById('backdrop');
  const audio    = document.getElementById('radar');

  function startCycle() {
    // snap on instantly
    backdrop.style.transition = 'none';
    bilson.style.transition   = 'none';
    backdrop.style.opacity    = '1';
    bilson.style.opacity      = '1';
    backdrop.style.display    = 'block';
    bilson.style.display      = 'block';

    audio.currentTime = 0;
    audio.play();

    // wait one frame so the snap registers, then begin slow fade
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const duration = audio.duration || 5; // seconds
        const fade = `opacity ${duration}s linear`;
        backdrop.style.transition = fade;
        bilson.style.transition   = fade;
        backdrop.style.opacity    = '0';
        bilson.style.opacity      = '0';
      });
    });
  }

  function activate() {
    btn.style.display = 'none';

    // need duration, so load first
    audio.addEventListener('loadedmetadata', () => {
      startCycle();
    }, { once: true });

    // if already loaded
    if (audio.readyState >= 1) {
      startCycle();
    } else {
      audio.load();
    }

    // repeat every time audio ends
    audio.addEventListener('ended', startCycle);
  }

  // kill switch: G + U + I
  const keys = new Set();
  document.addEventListener('keydown', e => {
    keys.add(e.key.toLowerCase());
    if (keys.has('g') && keys.has('u') && keys.has('i')) {
      audio.pause();
      audio.removeEventListener('ended', startCycle);
      backdrop.style.transition = 'opacity 0.4s';
      bilson.style.transition   = 'opacity 0.4s';
      backdrop.style.opacity    = '0';
      bilson.style.opacity      = '0';
      setTimeout(() => {
        backdrop.style.display = 'none';
        bilson.style.display   = 'none';
      }, 500);
    }
  });
  document.addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));
</script>
</body>
</html>
